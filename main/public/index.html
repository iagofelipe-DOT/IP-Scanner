<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner de Rede</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
    <body>
        <div class="container">
            <h1>IP Scanner</h1>
            <div class="input-group">
                <input type="text" id="target" placeholder="Digite o IP ou Domínio">
                <button id="scan-btn">Escanear</button>
            </div>
            <div id="progress-container" style="display: none; width: 100%; background-color: #eee; border-radius: 4px; margin-top: 15px;">
                 <div id="progress-bar" style="width: 0%; height: 10px; background-color: #4caf50; border-radius: 4px;"></div>
            </div>
            <div id="results" class="results-area">
        </div>
    </div>
    </body>
    <script src="./script.js"></script>
</html>
